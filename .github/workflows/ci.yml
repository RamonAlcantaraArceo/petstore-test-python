name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      publish_report:
        description: "Publish Allure report to GitHub Pages"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PETSTORE_API_BASE_URL: "http://localhost:8000/api/v1"
  PETSTORE_UI_BASE_URL: "https://the-internet.herokuapp.com"
  PETSTORE_API_KEY: ${{ secrets.PETSTORE_API_KEY }}
  # UI tests are opt-in; set to "1" in a separate workflow or matrix leg
  RUN_UI_TESTS: "0"
  PYTHONUNBUFFERED: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # --------------------------------------------------------------------------
  # Lint & type-check
  # --------------------------------------------------------------------------
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run ruff (lint)
        run: uv run ruff check .

      - name: Run black (format check)
        run: uv run black --check .

      - name: Run mypy (type check)
        run: uv run mypy framework/

  # --------------------------------------------------------------------------
  # API tests
  # --------------------------------------------------------------------------
  api-tests:
    name: API tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Start Petstore API container
        run: |
          docker run -d --rm \
            --name petstore-api-test \
            -p 8000:8000 \
            ghcr.io/ramonalcantaraarceo/petstore-api:latest
      - name: Wait for Petstore API to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8000/health | grep 'memory'; then
              echo "Petstore API is up!"
              exit 0
            fi
            echo "Waiting for Petstore API to be healthy... ($i/30)"
            sleep 2
          done
          echo "Petstore API did not become healthy in time." && exit 1

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run API tests with coverage
        run: |
          uv run pytest \
            --junitxml=junit-api.xml -o junit_family=legacy \
            tests/api/ \
            tests/api_client/ \
            -m "api" \
            --cov=framework \
            --cov-report=xml:coverage-api.xml \
            --cov-report=term-missing \
            --alluredir=allure-results/api \
            -v

      - name: Stop Petstore API container
        if: always()
        run: docker stop petstore-api-test

      - name: Upload test results to Codecov
        uses: codecov/test-results-action@v1.2.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: junit-api.xml
          flags: api
          fail_ci_if_error: false

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage-api.xml
          flags: api
          fail_ci_if_error: false

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-api
          path: allure-results/api/
          retention-days: 7

  # --------------------------------------------------------------------------
  # Integration tests
  # --------------------------------------------------------------------------
  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras --all-groups

      - name: Start Petstore API container
        run: |
          docker run -d --rm \
            --name petstore-api-test \
            -p 8000:8000 \
            ghcr.io/ramonalcantaraarceo/petstore-api:latest
      - name: Wait for Petstore API to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8000/health | grep 'memory'; then
              echo "Petstore API is up!"
              exit 0
            fi
            echo "Waiting for Petstore API to be healthy... ($i/30)"
            sleep 2
          done
          echo "Petstore API did not become healthy in time." && exit 1

      - name: Run integration tests with coverage
        run: |
          uv run pytest \
            --junitxml=junit-integration.xml -o junit_family=legacy \
            tests/integration/ \
            tests/integration_client/ \
            -m "integration" \
            --cov=framework \
            --cov-report=xml:coverage-integration.xml \
            --cov-report=term-missing \
            --alluredir=allure-results/integration \
            -v

      - name: Stop Petstore API container
        if: always()
        run: docker stop petstore-api-test

      - name: Upload test results to Codecov
        uses: codecov/test-results-action@v1.2.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: junit-integration.xml
          flags: integration
          fail_ci_if_error: false

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage-integration.xml
          flags: integration
          fail_ci_if_error: false

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-integration
          path: allure-results/integration/
          retention-days: 7

  # --------------------------------------------------------------------------
  # E2E tests
  # --------------------------------------------------------------------------
  e2e-tests:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras --all-groups

      - name: Start Petstore API container
        run: |
          docker run -d --rm \
            --name petstore-api-test \
            -p 8000:8000 \
            ghcr.io/ramonalcantaraarceo/petstore-api:latest
      - name: Wait for Petstore API to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8000/health | grep 'memory'; then
              echo "Petstore API is up!"
              exit 0
            fi
            echo "Waiting for Petstore API to be healthy... ($i/30)"
            sleep 2
          done
          echo "Petstore API did not become healthy in time." && exit 1

      - name: Run E2E tests with coverage
        run: |
          uv run pytest \
            --junitxml=junit-e2e.xml -o junit_family=legacy \
            tests/e2e/ \
            tests/e2e_client/ \
            -m "e2e" \
            --cov=framework \
            --cov-report=xml:coverage-e2e.xml \
            --cov-report=term-missing \
            --alluredir=allure-results/e2e \
            -v

      - name: Stop Petstore API container
        if: always()
        run: docker stop petstore-api-test

      - name: Upload test results to Codecov
        uses: codecov/test-results-action@v1.2.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: junit-e2e.xml
          flags: e2e
          fail_ci_if_error: false

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage-e2e.xml
          flags: e2e
          fail_ci_if_error: false

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-e2e
          path: allure-results/e2e/
          retention-days: 7

  # --------------------------------------------------------------------------
  # UI tests (Selenium – runs headless with Chrome)
  # --------------------------------------------------------------------------
  ui-tests:
    name: UI tests (Selenium)
    runs-on: ubuntu-latest
    needs: lint
    env:
      RUN_UI_TESTS: "1"
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras --all-groups

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Start Petstore API container
        run: |
          docker run -d --rm \
            --name petstore-api-test \
            -p 8000:8000 \
            ghcr.io/ramonalcantaraarceo/petstore-api:latest
      - name: Wait for Petstore API to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8000/health | grep 'memory'; then
              echo "Petstore API is up!"
              exit 0
            fi
            echo "Waiting for Petstore API to be healthy... ($i/30)"
            sleep 2
          done
          echo "Petstore API did not become healthy in time." && exit 1

      - name: Run UI tests
        run: |
          uv run pytest \
            tests/ui/ \
            --junitxml=junit-ui.xml -o junit_family=legacy \
            -m "ui" \
            --alluredir=allure-results/ui \
            -v
        env:
          HEADLESS: "true"

      - name: Stop Petstore API container
        if: always()
        run: docker stop petstore-api-test

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-ui
          path: allure-results/ui/
          retention-days: 7

  # --------------------------------------------------------------------------
  # Publish Allure Report (on main only)
  # --------------------------------------------------------------------------
  allure-report:
    name: Publish Allure Report
    runs-on: ubuntu-latest
    needs: [api-tests, integration-tests, e2e-tests, ui-tests]
    if: always()
    permissions:
      contents: write
      pages: write
      id-token: write
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Allure CLI
        run: |
          npm install -g allure
          allure --version

      - name: Download all Allure results
        uses: actions/download-artifact@v8
        with:
          pattern: allure-results-*
          path: allure-results/
          merge-multiple: true

      - name: Restore Allure history from gh-pages
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages-history
        continue-on-error: true

      - name: Restore Allure 3 history file
        run: |
          if [ -f "gh-pages-history/.allure/allure-history.jsonl" ]; then
            mkdir -p .allure
            cp gh-pages-history/.allure/allure-history.jsonl .allure/allure-history.jsonl
            echo "Allure 3 history restored from gh-pages."
          else
            echo "No previous Allure 3 history file found, starting fresh."
          fi

      - name: Add executor metadata for trend continuity
        run: |
          cat > allure-results/executor.json <<EOF
          {
            "name": "GitHub Actions",
            "type": "github",
            "buildOrder": ${GITHUB_RUN_NUMBER},
            "buildName": "${GITHUB_WORKFLOW} #${GITHUB_RUN_NUMBER}",
            "buildUrl": "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}",
            "reportName": "Petstore Test Report",
            "reportUrl": "https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}/"
          }
          EOF

      - name: Generate Allure report
        run: |
          allure generate allure-results \
            --output allure-report \
            --config allurerc.yml \
            --history-limit 20

      - name: Persist Allure 3 history file in published site
        run: |
          if [ -f ".allure/allure-history.jsonl" ]; then
            mkdir -p allure-report/.allure
            cp .allure/allure-history.jsonl allure-report/.allure/allure-history.jsonl
            echo "Allure 3 history file persisted for next run."
          fi

      - name: Post Allure summary to PR and job summary
        uses: allure-framework/allure-action@v0
        with:
          report-directory: "./allure-report"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          remote-href: "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"

      - name: Deploy report to GitHub Pages
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.publish_report == 'true' }}
        uses: peaceiris/actions-gh-pages@v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report

      - name: Notice Allure Report
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.publish_report == 'true' }}
        run: |
          echo "::notice title=Allure Report::https://ramonalcantaraarceo.github.io/petstore-test-python"
          echo "### 🚀 Allure Report Deployed" >> $GITHUB_STEP_SUMMARY
          echo "[🔗 View Report](https://ramonalcantaraarceo.github.io/petstore-test-python)" >> $GITHUB_STEP_SUMMARY
