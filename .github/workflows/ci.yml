name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PETSTORE_API_BASE_URL: "http://localhost:8000/api/v1"
  PETSTORE_UI_BASE_URL: "https://the-internet.herokuapp.com"
  PETSTORE_API_KEY: ${{ secrets.PETSTORE_API_KEY }}
  # UI tests are opt-in; set to "1" in a separate workflow or matrix leg
  RUN_UI_TESTS: "0"
  PYTHONUNBUFFERED: "1"

jobs:
  # --------------------------------------------------------------------------
  # Lint & type-check
  # --------------------------------------------------------------------------
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run ruff (lint)
        run: uv run ruff check .

      - name: Run black (format check)
        run: uv run black --check .

      - name: Run mypy (type check)
        run: uv run mypy framework/

  # --------------------------------------------------------------------------
  # API tests
  # --------------------------------------------------------------------------
  api-tests:
    name: API tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Start Petstore API container
        run: |
          docker run -d --rm \
            --name petstore-api-test \
            -p 8000:8000 \
            ghcr.io/ramonalcantaraarceo/petstore-api:latest
      - name: Wait for Petstore API to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8000/health | grep 'memory'; then
              echo "Petstore API is up!"
              exit 0
            fi
            echo "Waiting for Petstore API to be healthy... ($i/30)"
            sleep 2
          done
          echo "Petstore API did not become healthy in time." && exit 1

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run API tests with coverage
        run: |
          uv run pytest tests/api/ \
            -m "api" \
            --cov=framework \
            --cov-report=xml:coverage-api.xml \
            --cov-report=term-missing \
            --alluredir=allure-results/api \
            -v

      - name: Stop Petstore API container
        if: always()
        run: docker stop petstore-api-test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage-api.xml
          flags: api
          fail_ci_if_error: false

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-api
          path: allure-results/api/
          retention-days: 7

  # --------------------------------------------------------------------------
  # Integration tests
  # --------------------------------------------------------------------------
  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Start Petstore API container
        run: |
          docker run -d --rm \
            --name petstore-api-test \
            -p 8000:8000 \
            ghcr.io/ramonalcantaraarceo/petstore-api:latest
      - name: Wait for Petstore API to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8000/health | grep 'memory'; then
              echo "Petstore API is up!"
              exit 0
            fi
            echo "Waiting for Petstore API to be healthy... ($i/30)"
            sleep 2
          done
          echo "Petstore API did not become healthy in time." && exit 1

      - name: Run integration tests with coverage
        run: |
          uv run pytest tests/integration/ \
            -m "integration" \
            --cov=framework \
            --cov-report=xml:coverage-integration.xml \
            --cov-report=term-missing \
            --alluredir=allure-results/integration \
            -v

      - name: Stop Petstore API container
        if: always()
        run: docker stop petstore-api-test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage-integration.xml
          flags: integration
          fail_ci_if_error: false

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-integration
          path: allure-results/integration/
          retention-days: 7

  # --------------------------------------------------------------------------
  # E2E tests
  # --------------------------------------------------------------------------
  e2e-tests:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Start Petstore API container
        run: |
          docker run -d --rm \
            --name petstore-api-test \
            -p 8000:8000 \
            ghcr.io/ramonalcantaraarceo/petstore-api:latest
      - name: Wait for Petstore API to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8000/health | grep 'memory'; then
              echo "Petstore API is up!"
              exit 0
            fi
            echo "Waiting for Petstore API to be healthy... ($i/30)"
            sleep 2
          done
          echo "Petstore API did not become healthy in time." && exit 1

      - name: Run E2E tests with coverage
        run: |
          uv run pytest tests/e2e/ \
            -m "e2e" \
            --cov=framework \
            --cov-report=xml:coverage-e2e.xml \
            --cov-report=term-missing \
            --alluredir=allure-results/e2e \
            -v

      - name: Stop Petstore API container
        if: always()
        run: docker stop petstore-api-test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage-e2e.xml
          flags: e2e
          fail_ci_if_error: false

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-e2e
          path: allure-results/e2e/
          retention-days: 7

  # --------------------------------------------------------------------------
  # UI tests (Selenium – runs headless with Chrome)
  # --------------------------------------------------------------------------
  ui-tests:
    name: UI tests (Selenium)
    runs-on: ubuntu-latest
    needs: lint
    env:
      RUN_UI_TESTS: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Start Petstore API container
        run: |
          docker run -d --rm \
            --name petstore-api-test \
            -p 8000:8000 \
            ghcr.io/ramonalcantaraarceo/petstore-api:latest
      - name: Wait for Petstore API to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8000/health | grep 'memory'; then
              echo "Petstore API is up!"
              exit 0
            fi
            echo "Waiting for Petstore API to be healthy... ($i/30)"
            sleep 2
          done
          echo "Petstore API did not become healthy in time." && exit 1

      - name: Run UI tests
        run: |
          uv run pytest tests/ui/ \
            -m "ui" \
            --alluredir=allure-results/ui \
            -v
        env:
          HEADLESS: "true"

      - name: Stop Petstore API container
        if: always()
        run: docker stop petstore-api-test

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-ui
          path: allure-results/ui/
          retention-days: 7

  # --------------------------------------------------------------------------
  # Publish Allure Report (on main only)
  # --------------------------------------------------------------------------
  allure-report:
    name: Publish Allure Report
    runs-on: ubuntu-latest
    needs: [api-tests, integration-tests, e2e-tests, ui-tests]
    if: always() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/fix-allure-report')
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results/
          merge-multiple: true

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@v1.13
        with:
          allure_results: allure-results
          allure_report: allure-report
          gh_pages: gh-pages
          allure_history: allure-history
          keep_reports: 20

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history