services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: petstore
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localpassword}
      POSTGRES_DB: petstore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petstore"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    image: ghcr.io/ramonalcantaraarceo/petstore-api:latest
    ports:
      - "8000:8000"
    environment:
      STORAGE_MODE: local
      DATABASE_URL: postgresql+asyncpg://petstore:${POSTGRES_PASSWORD:-localpassword}@postgres:5432/petstore
      API_KEY: ${API_KEY:-dev-api-key}
      APP_ENV: dev
      LOG_LEVEL: INFO
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp/app:mode=1777,size=100M
      - /tmp:mode=1777,size=10M
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
